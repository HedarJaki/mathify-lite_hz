name: PR Checks

# Build + DB integration + unit tests live in maven.yml. This workflow only
# adds the two checks that one does not cover: PR title linting and the
# project-preferences linter.

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semantic-pr-title:
    name: Validate PR Title
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  preferences-check:
    name: Code Preferences Check
    runs-on: ubuntu-latest
    # An edited title/description cannot change source files, so skip the
    # preferences linter on `edited`; only the title job needs to re-run.
    if: github.event.action != 'edited'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Preferences
        run: python tools/verify-preferences.py
