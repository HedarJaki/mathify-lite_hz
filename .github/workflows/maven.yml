name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR branch).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; the build job widens to contents:write only for
# the dependency-graph submission step.
permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: mathify_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Wait for MySQL to be ready
      run: |
        until mysqladmin ping -h 127.0.0.1 --silent; do
          echo "Waiting for MySQL database to be ready..."
          sleep 2
        done
        echo "MySQL is up and running!"

    - name: Initialize Database Schema
      run: |
        mysql -h 127.0.0.1 -u root < database/mathify_schema.sql
        mysql -h 127.0.0.1 -u root < database/insert_admin.sql
        mysql -h 127.0.0.1 -u root < database/insert_course_1.sql
        if [ -f database/insert_course_2.sql ]; then mysql -h 127.0.0.1 -u root < database/insert_course_2.sql; fi

    - name: Run Schema Migrations (DBUpdater)
      run: mvn compile exec:java -Dexec.mainClass="com.mathify.db.DBUpdater"

    - name: DB Smoke Check (CheckDB)
      run: mvn test-compile exec:java -Dexec.classpathScope="test" -Dexec.mainClass="CheckDB"

    - name: Build and Test
      # `package` runs the surefire unit tests and produces the WAR.
      run: mvn -B clean package

    # Uploads the dependency graph to GitHub to improve Dependabot alerts.
    # Only meaningful on the default branch, and needs contents:write (granted
    # at the job level above), so skip it on pull requests.
    - name: Update dependency graph
      if: github.event_name == 'push'
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6 # v5.0.0
