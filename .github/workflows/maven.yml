name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: mathify_db
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Wait for MySQL to be ready
      run: |
        until mysqladmin ping -h 127.0.0.1 --silent; do
          echo "Waiting for MySQL database to be ready..."
          sleep 2
        done
        echo "MySQL is up and running!"

    - name: Initialize Database Schema
      run: |
        mysql -h 127.0.0.1 -u root < database/mathify_schema.sql
        mysql -h 127.0.0.1 -u root < database/insert_admin.sql
        mysql -h 127.0.0.1 -u root < database/insert_course_1.sql
        mysql -h 127.0.0.1 -u root < database/insert_course_2.sql

    - name: Run Schema Migrations (DBUpdater)
      run: mvn compile exec:java -Dexec.mainClass="com.mathify.db.DBUpdater"

    - name: Verify DB Connection (CheckDB)
      run: mvn test-compile exec:java -Dexec.classpathScope="test" -Dexec.mainClass="CheckDB"

    - name: Build Package with Maven
      run: mvn -B clean package

    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
